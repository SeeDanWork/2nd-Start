version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: adcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: adcp
      POSTGRES_PASSWORD: adcp_dev_password
      POSTGRES_DB: adcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adcp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adcp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  optimizer:
    build:
      context: ../apps/optimizer
      dockerfile: Dockerfile
    container_name: adcp-optimizer
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
